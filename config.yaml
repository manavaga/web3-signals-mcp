# config.yaml — THE scoring rulebook
# All weights, thresholds, and agent configs live here.
# Validated by Pydantic at startup — crash on bad config.

scoring:
  weights_default:
    technical: 0.45
    derivatives: 0.05
    market: 0.50
  weights_bullish:
    technical: 0.40
    derivatives: 0.05
    market: 0.55
  weights_bearish:
    technical: 0.50
    derivatives: 0.05
    market: 0.45
  per_tier_weights:
    large_cap:
      assets: [BTC, ETH]
      weights_bullish:
        technical: 0.35
        derivatives: 0.05
        market: 0.60
      weights_bearish:
        technical: 0.50
        derivatives: 0.05
        market: 0.45
    small_cap:
      assets: [MATIC, UNI, FIL, NEAR, APT, ARB, SUI]
      weights_bullish:
        technical: 0.40
        derivatives: 0.05
        market: 0.55
      weights_bearish:
        technical: 0.50
        derivatives: 0.05
        market: 0.45
  labels:
    - { name: "STRONG BUY", min_score: 70 }
    - { name: "MODERATE BUY", min_score: 60 }
    - { name: "NEUTRAL", min_score: 42 }
    - { name: "MODERATE SELL", min_score: 30 }
    - { name: "STRONG SELL", min_score: 0 }
  abstain:
    bearish_min_distance: 5
    bullish_min_distance: 6
  tier_multipliers:
    full: 1.0
    partial: 0.5
    none: 0.0
  momentum_threshold: 5
  relative_momentum:
    multiplier: 0.15
    max_adjustment: 5.0

regime:
  btc_ma_period: 30
  trending_threshold: 0.08
  ranging_threshold: 0.03
  adx_trending_threshold: 25.0
  adx_ranging_threshold: 20.0
  weight_shifts:
    trending_up:
      technical: 1.2
      derivatives: 0.9
      market: 1.1
    trending_down:
      technical: 1.2
      derivatives: 1.1
      market: 0.9
      bullish_dampen: 0.5
    ranging:
      technical: 1.1
      derivatives: 0.8
      market: 1.2
    volatile:
      technical: 0.9
      derivatives: 1.0
      market: 1.1
  abstain_multiplier:
    trending_up: 0.7
    trending_down: 0.7
    ranging: 1.2
    volatile: 1.5
  fg_thresholds:
    extreme_fear: 20
    fear: 40
    neutral: 60
    greed: 80

targets:
  timeframe_hours: 48
  min_rr_ratio: 1.5
  move_distance_divisor: 10.0
  move_atr_multiplier: 2.5
  move_max_atr_factor: 3.0
  move_min_floor_atr_factor: 0.5
  ml_blend_weight: 0.6
  ml_max_move_pct: 30.0
  model_max_age_hours: 24
  min_training_samples: 30

agents:
  technical:
    cadence_minutes: 60
    binance_kline_limit: 50
    intervals: ["1d", "4h"]
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bb_period: 20
    bb_std_dev: 2
    bb_squeeze_threshold: 0.04
    volume_ma_period: 20
    volume_spike_threshold: 2.0
    volume_elevated_threshold: 1.5
    volume_low_threshold: 0.5
    atr_period: 14
    scoring_weights:
      rsi: 0.15
      macd: 0.10
      bb_bandwidth: 0.15
      trend: 0.15
      obv: 0.15
      roc_7d: 0.10
      squeeze: 0.10
      macd_zscore: 0.10
    # Regime-specific weight overrides (trending = momentum, ranging = mean-reversion)
    regime_scoring_weights:
      trending:
        rsi: 0.10
        macd: 0.10
        bb_bandwidth: 0.10
        trend: 0.20
        obv: 0.15
        roc_7d: 0.15
        squeeze: 0.10
        macd_zscore: 0.10
      ranging:
        rsi: 0.20
        macd: 0.10
        bb_bandwidth: 0.20
        trend: 0.10
        obv: 0.10
        roc_7d: 0.10
        squeeze: 0.10
        macd_zscore: 0.10
    volume_spike_bonus: 10
  derivatives:
    cadence_minutes: 60
    scoring_weights:
      long_short: 0.20
      funding: 0.25
      open_interest: 0.15
      liquidations: 0.20
      taker_ratio: 0.20
    ls_overcrowded: 0.65
    ls_shorts_dominating: 0.55
    ls_contrarian: 0.45
    funding_extreme: 0.001
    funding_extreme_negative: 0.005
    oi_change_threshold_pct: 5.0
    liq_imbalance_threshold: 0.3
  market:
    cadence_minutes: 120
    scoring_weights:
      fear_greed: 0.15
      volume: 0.10
      macro: 0.15
      order_book: 0.15
      stablecoin: 0.15
      dxy: 0.10
      nasdaq: 0.10
      vix_roc: 0.10
    volume_spike_threshold: 2.0
    macro_vix_risk_off: 25
    macro_vix_risk_on: 18
    macro_sp_risk_off_pct: -1.5
    macro_sp_risk_on_pct: 0.5
    macro_dxy_risk_off_pct: 0.5
    macro_dxy_risk_on_pct: -0.3
    stablecoin_inflow_threshold: 0.5

evaluation:
  gradient_thresholds:
    strong_correct: 1.0
    correct: 0.7
    weak_correct: 0.4
    weak_wrong: 0.2
    wrong: 0.0
  windows_hours: [24, 48]
  cwa_target_coverage: 0.30
  min_evaluation_age_hours: 48

learning:
  shadow_mode: true
  shadow_min_days: 90
  dirichlet_concentration: 10.0
  weight_step_size: 0.02
  min_signals_per_asset: 20
  ic_min_observations: 8
  drift_detection:
    cwa_floor: 0.40
    cwa_critical: 0.30
    lookback_windows: 3

trading:
  base_fee_pct: 0.10       # Binance taker fee
  spread_pct: 0.05          # Estimated bid-ask spread
  slippage_multiplier: 1.0  # Spread * multiplier for slippage
